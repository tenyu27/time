<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: rgba(0, 0, 0, 0.85);
      --text-color: #ffffff;
      --accent-color: #ffffff;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --border-radius: 16px;
      --padding: 12px 18px;
      --blur: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: transparent;
      font-family: var(--font-main);
      color: var(--text-color);
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #clock-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 300px;
      height: 100px;
      padding: var(--padding);
      background: var(--bg-color);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards;
      transition: transform 0.3s ease;
      overflow: hidden;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .time-container {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    #time {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      font-variant-numeric: tabular-nums;
    }

    #suffix {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.05em;
    }

    #date {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Responsive override for OBS custom CSS if needed */
    .custom-style #clock-widget {
      background: none;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
    }
  </style>
</head>

<body>
  <div id="clock-widget">
    <div class="time-container">
      <span id="time">00:00:00</span>
      <span id="suffix">PT</span>
    </div>
    <div id="date">JAN 01, 2024</div>
  </div>

  <script>
    const timeElement = document.getElementById('time');
    const dateElement = document.getElementById('date');
    const suffixElement = document.getElementById('suffix');
    const widget = document.getElementById('clock-widget');

    // URL Parameters handling
    const urlParams = new URLSearchParams(window.location.search);

    // Timezone Alias Map
    const tzMap = {
      'PST': 'America/Los_Angeles',
      'PDT': 'America/Los_Angeles',
      'PT': 'America/Los_Angeles',
      'EST': 'America/New_York',
      'EDT': 'America/New_York',
      'ET': 'America/New_York',
      'CST': 'America/Chicago',
      'CDT': 'America/Chicago',
      'CT': 'America/Chicago',
      'MST': 'America/Denver',
      'MDT': 'America/Denver',
      'MT': 'America/Denver',
      'UTC': 'UTC',
      'GMT': 'GMT',
      'JST': 'Asia/Tokyo',
      'KST': 'Asia/Seoul',
      'BST': 'Europe/London',
      'CET': 'Europe/Paris',
      'CEST': 'Europe/Paris',
      'AEST': 'Australia/Sydney',
      'AEDT': 'Australia/Sydney',
    };

    const tzInput = urlParams.get('tz') || 'PST';
    let timeZone = tzMap[tzInput.toUpperCase()] || tzInput;

    // Validate timezone and fallback to PST if invalid
    try {
      new Intl.DateTimeFormat('en-US', { timeZone }).format(new Date());
    } catch (e) {
      console.warn(`Invalid timezone "${timeZone}", falling back to America/Los_Angeles`);
      timeZone = 'America/Los_Angeles';
    }

    // Scale support
    if (urlParams.has('scale')) {
      widget.style.transform = `scale(${urlParams.get('scale')})`;
      widget.style.transformOrigin = 'top left';
    }

    // Custom Styles
    if (urlParams.has('style')) {
      widget.setAttribute('style', widget.getAttribute('style') + ';' + urlParams.get('style'));
    }

    if (urlParams.has('transparent')) {
      widget.style.background = 'none';
      widget.style.border = 'none';
      widget.style.boxShadow = 'none';
      widget.style.backdropFilter = 'none';
    }

    const use12h = urlParams.get('12h') === 'true';

    function updateClock() {
      const now = new Date();

      // Format Time
      const timeParts = new Intl.DateTimeFormat('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: use12h,
        timeZone: timeZone
      }).formatToParts(now);

      const hour = timeParts.find(p => p.type === 'hour').value;
      const minute = timeParts.find(p => p.type === 'minute').value;
      const second = timeParts.find(p => p.type === 'second').value;
      const dayPeriod = use12h ? timeParts.find(p => p.type === 'dayPeriod').value : '';

      timeElement.textContent = `${hour}:${minute}:${second}`;

      // Format Timezone Abbreviation
      const tzPart = new Intl.DateTimeFormat('en-US', {
        timeZone: timeZone,
        timeZoneName: 'short'
      }).formatToParts(now).find(p => p.type === 'timeZoneName').value;

      suffixElement.textContent = use12h ? `${dayPeriod} ${tzPart}` : tzPart;

      // Format Date
      dateElement.textContent = new Intl.DateTimeFormat('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        timeZone: timeZone
      }).format(now).toUpperCase();
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>

</html>
